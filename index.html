function generateSummary(pct, s1, s2, s3){
  var d = new Date();
  var lvlLabel = ['','Support (L1)','Standard (L2)','Challenge (L3)'][state.level]||'';
  var SEP  = '==========================================';
  var SEP2 = '------------------------------------------';

  function getField(obj, key){ return (obj && obj[key]) || ''; }

  function sectionBlock(secId, secTitle){
    // Keys generated by sectionKey(prefix, id) = prefix+'_'+id
    var trans = getField(state.translationAttempts, 'translation_'+secId);
    var refl  = getField(state.reflections,         'reflection_'+secId);
    var open  = getField(state.openEndedResponses,  'open_'+secId);
    var sp    = sectionPct(secId);
    var block = '\n'+secTitle+' ('+sp+'%)\n'+SEP2;
    if(trans){ block += '\nTranslation:\n  '+trans.replace(/\n/g,'\n  '); }
    else      { block += '\nTranslation: (not submitted)'; }
    if(refl){  block += '\n\nReflection:\n  '+refl.replace(/\n/g,'\n  '); }
    else      { block += '\n\nReflection: (not submitted)'; }
    if(open){  block += '\n\nOpen-ended response:\n  '+open.replace(/\n/g,'\n  '); }
    return block;
  }

  var body = '';
  body += 'CRAZY INVENTIONS: Rube Goldberg Challenge\n';
  body += SEP+'\n';
  body += 'Student:      '+state.name+'\n';
  body += 'Date:         '+d.toLocaleDateString()+'\n';
  body += 'Level:        '+lvlLabel+'\n';
  body += '\nSCORES\n'+SEP2+'\n';
  body += 'Part 1 – Rube Goldberg:  '+sectionPct(1)+'%\n';
  body += 'Part 2 – His Drawings:   '+sectionPct(2)+'%\n';
  body += 'Part 3 – The Contest:    '+sectionPct(3)+'%\n';
  body += 'TOTAL:                   '+pct+'%\n';
  body += '\nActivities completed: '+Object.values(state.completedActivities).flat().length;
  body += '\nRecording: '+(state.recordingSection ? 'Yes – Section '+state.recordingSection : (state.completedActivities && Object.values(state.completedActivities).some(arr=>arr.includes(8)) ? 'Skipped (microphone unavailable)' : 'No'));

  body += '\n\n'+SEP+'\nSTUDENT WORK\n'+SEP;
  body += sectionBlock(1, 'SECTION 1: Rube Goldberg');
  body += '\n'+sectionBlock(2, 'SECTION 2: His Drawings');
  body += '\n'+sectionBlock(3, 'SECTION 3: The Contest');

  if(state.bonusTask && state.bonusTask.task){
    body += '\n\n'+SEP+'\nBONUS TASK\n'+SEP2+'\n';
    body += 'Task:     '+state.bonusTask.task+'\n';
    if(state.bonusTask.steps)   body += 'Steps:\n  '+state.bonusTask.steps.replace(/\n/g,'\n  ')+'\n';
    if(state.bonusTask.objects) body += 'Objects:  '+state.bonusTask.objects+'\n';
  }

  if(state.recordingBlobBase64){
    body += '\n'+SEP+'\nRECORDING\n'+SEP2+'\n';
    body += '🎤 Recording completed.\n';
    body += 'Please download the recording from the results page\n';
    body += 'and attach it to this message before sending.\n';
  }

  body += '\n'+SEP;
  return body;
}

function downloadRecording(){
  if(!state.recordingBlobBase64) return;
  const a = document.createElement('a');
  a.href = state.recordingBlobBase64;
  a.download = (state.name||'student').replace(/[^a-z0-9]/gi,'_')+'_recording.webm';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>document.body.removeChild(a),200);
  flash('Recording downloaded!','good');
}

function copySummary(){
  const box = $('summaryBox');
  if(!box) return;
  const text = box.textContent;
  navigator.clipboard.writeText(text).then(()=>flash('✓ Copied!','good')).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
    flash('✓ Copied!','good');
  });
}

// ═══════════════════════════════════════════════
//  S H A R E   R E S U L T S
// ═══════════════════════════════════════════════
function ensureResultsImage(){
  // Always regenerate to reflect latest scores; canvas may be in or out of DOM
  const canvas = document.createElement('canvas');
  canvas.width = 1200; canvas.height = 1600;
  const ctx = canvas.getContext('2d');
  const pct = finalPercent();
  const s1 = sectionScore(1), s2 = sectionScore(2), s3 = sectionScore(3);
  ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  grad.addColorStop(0,'#1a1610'); grad.addColorStop(1,'#2b1d12');
  ctx.fillStyle = grad; ctx.fillRect(40,40,1120,1520);
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 6; ctx.strokeRect(40,40,1120,1520);
  ctx.fillStyle = '#c9a227';
  ctx.font = 'bold 60px "Trebuchet MS",Arial,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('CRAZY INVENTIONS', 600, 140);
  ctx.font = '30px "Trebuchet MS",Arial,sans-serif';
  ctx.fillStyle = '#f0ece0';
  ctx.fillText('Rube Goldberg Challenge Results', 600, 190);
  ctx.beginPath(); ctx.arc(600, 340, 120, 0, Math.PI*2);
  ctx.strokeStyle='#c9a227'; ctx.lineWidth=10; ctx.stroke();
  ctx.fillStyle='#c9a227'; ctx.font='bold 88px "Courier New",monospace';
  ctx.fillText(pct + '%', 600, 370);
  const lvlSafe = ['','Support','Standard','Challenge'][state.level]||'';
  const nameSafe = (state.name||'').replace(/[\x80-\uFFFF]/g,'').trim();
  ctx.fillStyle='#f0ece0'; ctx.textAlign='left';
  ctx.font = '36px Georgia,serif';
  const lines = [
    'Student: ' + nameSafe,
    'Level: ' + lvlSafe,
    'Total Score: ' + pct + '%',
    'Part 1 - Rube Goldberg: ' + sectionPct(1) + '%',
    'Part 2 - His Drawings: ' + sectionPct(2) + '%',
    'Part 3 - The Contest: ' + sectionPct(3) + '%',
    'Recorded: ' + (state.recordingSection ? 'Yes' : (Object.values(state.completedActivities).some(arr=>arr.includes(8)) ? 'Skipped (mic unavailable)' : 'No')),
    'Activities: ' + Object.values(state.completedActivities).flat().length + ' completed'
  ];
  let y = 520;
  lines.forEach(function(line){ ctx.fillText(line, 120, y); y += 74; });
  if(state.bonusTask && state.bonusTask.task){
    ctx.fillStyle='#c9a227'; ctx.font='bold 34px "Trebuchet MS",Arial';
    ctx.fillText('Bonus Machine Idea:', 120, y+20);
    ctx.fillStyle='#f0ece0'; ctx.font='30px Georgia,serif';
    const bwrap = ([state.bonusTask.task,state.bonusTask.objects].filter(Boolean).join(' | ')).replace(/[\x80-\uFFFF]/g,'').slice(0,65);
    ctx.fillText(bwrap, 120, y+70);
  }
  ctx.textAlign='center'; ctx.fillStyle='#8a8478'; ctx.font='24px "Courier New",monospace';
  ctx.fillText(new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString(), 600, 1500);
  return canvas.toDataURL('image/png');
}

function dataURLtoFile(dataurl, filename) {
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--){ u8arr[n] = bstr.charCodeAt(n); }
  return new File([u8arr], filename, {type:mime});
}

function resultsSummaryText(){
  // Generate fresh every time – never depend on DOM (may be on different screen)
  return generateSummary(finalPercent(), sectionScore(1), sectionScore(2), sectionScore(3));
}

async function shareResultsNative(){
  try{
    const dataUrl = ensureResultsImage();
    const file = dataURLtoFile(dataUrl, `${(state.name||'student').replace(/[^a-z0-9]/gi,'_')}_results.png`);
    const text = resultsSummaryText();
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ title:'Rube Goldberg Results', text, files:[file] });
      flash('Share sheet opened','good');
      return;
    }
    if(navigator.share){
      await navigator.share({ title:'Rube Goldberg Results', text });
      return;
    }
    flash('Native sharing is not supported on this device. Download the image instead.','info');
  } catch(e){
    // AbortError = user closed the share dialog; anything else is a real error
    if(e && e.name !== 'AbortError'){
      flash('Could not share. Try downloading the image instead.','bad');
    }
  }
}

function downloadResultsImage(){
  const dataUrl = ensureResultsImage();
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `${(state.name||'student').replace(/[^a-z0-9]/gi,'_')}_results.png`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => document.body.removeChild(a), 200);
  flash('Results image downloaded!','good');
}

function normalizePhone(phone){
  return (phone || '').replace(/[^\d]/g,'');
}

function shareViaWhatsApp(){
  const phone = normalizePhone(($('teacherPhone')||{}).value || state.teacherPhone || '');
  state.teacherPhone = phone;
  saveProgress();
  if(!phone){ flash('Please enter the teacher phone number first','bad'); return; }
  const recNote = state.recordingBlobBase64
    ? '\n\n🎤 IMPORTANT: Please also download and attach your recording file from the results page.'
    : '';
  const msg = resultsSummaryText() + '\n\nPlease attach the results screenshot.' + recNote;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

  const ni = $('nameInput');
  if(ni && !ni._listened){
    ni._listened = true;
    ni.addEventListener('keydown', e => { if(e.key==='Enter') submitName(); });
  }
  // results image generated on demand in share/download functions
}

if(typeof speechSynthesis !== 'undefined'){
  // Trigger voice list fetch
  speechSynthesis.getVoices();
  if(speechSynthesis.onvoiceschanged !== undefined){
    speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.getVoices(); // cache them
    };
  }
}

// Handle page visibility (stop audio when tab hidden)
document.addEventListener('visibilitychange', () => {
  if(document.hidden) stopSpeech();
});

// Start app
if(!loadProgress()) state.screen = 'welcome';
render();
