<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚙️ Crazy Inventions: The Rube Goldberg Challenge</title>
<style>
:root{
  --brass:#c9a227;--copper:#b87333;--dark:#0d0d0d;--card:#1a1610;
  --rust:#7a2e0e;--cream:#f0ece0;--dim:#8a8478;--success:#27ae60;
  --danger:#c0392b;--blue:#2980b9;--shadow:rgba(201,162,39,.25);
  --border:rgba(201,162,39,.35);--font-head:'Trebuchet MS',Impact,sans-serif;
  --font-body:Georgia,'Times New Roman',serif;--font-mono:'Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--cream);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;position:relative;}
::selection{background:var(--brass);color:var(--dark);}

/* BACKGROUND */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-layer::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(139,67,19,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,162,39,.08) 0%,transparent 50%);}
.gear-float{position:absolute;opacity:.06;animation:spinGear linear infinite;font-size:inherit;line-height:1;color:var(--brass);}
.gf1{font-size:220px;top:-60px;left:-60px;animation-duration:40s;}
.gf2{font-size:140px;top:15%;right:-40px;animation-duration:25s;animation-direction:reverse;}
.gf3{font-size:350px;bottom:-100px;right:-100px;animation-duration:55s;}
.gf4{font-size:110px;bottom:25%;left:-25px;animation-duration:20s;animation-direction:reverse;}
.gf5{font-size:90px;top:45%;left:35%;animation-duration:60s;}
@keyframes spinGear{to{transform:rotate(360deg);}}

/* LAYOUT */
#app{position:relative;z-index:1;min-height:100vh;max-width:860px;margin:0 auto;padding:16px;}

/* TYPOGRAPHY */
h1{font-family:var(--font-head);letter-spacing:2px;}
h2{font-family:var(--font-head);letter-spacing:1px;}
h3{font-family:var(--font-head);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:12px 0;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.card-sm{padding:16px;border-radius:8px;}

/* BUTTONS */
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:8px;font-family:var(--font-head);font-size:1rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden;touch-action:manipulation;}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .2s;}
.btn:hover::after{opacity:1;}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,var(--brass),var(--copper));color:var(--dark);}
.btn-outline{background:transparent;border:2px solid var(--brass);color:var(--brass);}
.btn-outline:hover{background:rgba(201,162,39,.1);}
.btn-danger{background:var(--danger);color:white;}
.btn-success{background:var(--success);color:white;}
.btn-blue{background:var(--blue);color:white;}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--cream);border:1px solid var(--border);}
.btn-lg{padding:16px 36px;font-size:1.15rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:disabled::after{display:none;}
.btn-block{display:block;width:100%;text-align:center;}
.btn:active:not(:disabled){transform:scale(.95) !important;opacity:.85;}
.word-bank-word:active{background:rgba(201,162,39,.25);border-color:var(--brass);}
.comp-option:active{border-color:var(--brass);background:rgba(201,162,39,.07);}
.vocab-word-card:active{border-color:var(--brass);background:rgba(201,162,39,.1);}
.vocab-def-card:active{border-color:var(--brass);background:rgba(201,162,39,.1);}

/* PROGRESS */
.progress-bar-wrap{background:rgba(255,255,255,.07);border-radius:99px;height:10px;overflow:hidden;border:1px solid var(--border);}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--copper),var(--brass));border-radius:99px;transition:width .5s ease;}

/* STARS */
.stars{color:var(--brass);font-size:1.3rem;letter-spacing:2px;}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.75rem;font-family:var(--font-head);letter-spacing:.5px;}
.badge-gold{background:var(--brass);color:var(--dark);}
.badge-green{background:var(--success);color:white;}
.badge-red{background:var(--danger);color:white;}
.badge-blue{background:var(--blue);color:white;}

/* INPUTS */
input[type=text],input[type=tel],textarea{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--cream);padding:12px 16px;font-size:1rem;font-family:var(--font-body);width:100%;outline:none;transition:border-color .2s;}
input[type=text]:focus,input[type=tel]:focus,textarea:focus{border-color:var(--brass);}
textarea{resize:vertical;min-height:120px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* SECTION BADGE */
.sec-badge{display:inline-block;width:36px;height:36px;border-radius:50%;background:var(--brass);color:var(--dark);font-family:var(--font-head);font-size:1rem;font-weight:bold;text-align:center;line-height:36px;}

/* ============ SCREEN: WELCOME ============ */
.welcome-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.welcome-title{font-size:clamp(2rem,8vw,4rem);color:var(--brass);text-shadow:0 0 40px rgba(201,162,39,.5);margin-bottom:8px;animation:titlePulse 3s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{text-shadow:0 0 40px rgba(201,162,39,.5);}50%{text-shadow:0 0 80px rgba(201,162,39,.9),0 0 120px rgba(201,162,39,.4);}}
.welcome-sub{font-size:clamp(.9rem,3vw,1.4rem);color:var(--dim);letter-spacing:3px;margin-bottom:40px;font-family:var(--font-mono);}
.chain-visual{display:flex;align-items:center;justify-content:center;gap:8px;margin:30px 0;font-size:1.8rem;animation:chainMove 2s ease-in-out infinite;}
@keyframes chainMove{0%,100%{transform:translateX(0);}50%{transform:translateX(8px);}}
.chain-item{animation:bounceChain .6s ease-in-out infinite alternate;}
.chain-item:nth-child(2){animation-delay:.1s;}
.chain-item:nth-child(3){animation-delay:.2s;}
.chain-item:nth-child(4){animation-delay:.3s;}
.chain-item:nth-child(5){animation-delay:.4s;}
@keyframes bounceChain{to{transform:translateY(-5px);}}

/* ============ SCREEN: LEVEL ============ */
.level-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px;}
.level-card{border:2px solid transparent;border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;touch-action:manipulation;}
.level-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;}
.level-card:hover{transform:translateY(-4px);}
.level-card.lv1{border-color:var(--success);}
.level-card.lv1::before{background:rgba(39,174,96,.08);}
.level-card.lv1:hover::before{opacity:1;}
.level-card.lv2{border-color:var(--brass);}
.level-card.lv2::before{background:rgba(201,162,39,.08);}
.level-card.lv2:hover::before{opacity:1;}
.level-card.lv3{border-color:var(--danger);}
.level-card.lv3::before{background:rgba(192,57,43,.08);}
.level-card.lv3:hover::before{opacity:1;}
.level-icon{font-size:3rem;margin-bottom:12px;display:block;}
.level-label{font-family:var(--font-head);font-size:1.2rem;margin-bottom:8px;}
.level-desc{font-size:.85rem;color:var(--dim);line-height:1.5;}
.level-card.selected{transform:translateY(-4px) scale(1.02);}
.level-card.lv1.selected{background:rgba(39,174,96,.15);}
.level-card.lv2.selected{background:rgba(201,162,39,.15);}
.level-card.lv3.selected{background:rgba(192,57,43,.15);}

/* ============ SCREEN: HUB ============ */
.hub-header{text-align:center;margin-bottom:30px;}
.hub-score{font-family:var(--font-mono);font-size:2rem;color:var(--brass);margin:8px 0;}
.mission-cards{display:grid;gap:16px;}
.mission-card{display:flex;align-items:center;gap:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative;touch-action:manipulation;}
.mission-card:hover:not(.locked){transform:translateX(6px);}
.mission-card.locked{opacity:.5;cursor:not-allowed;}
.mission-icon{font-size:2.5rem;flex-shrink:0;}
.mission-info{flex:1;}
.mission-title{font-family:var(--font-head);font-size:1.1rem;color:var(--brass);}
.mission-sub{font-size:.85rem;color:var(--dim);margin-top:4px;}
.mission-progress{margin-top:8px;}
.mission-arrow{font-size:1.5rem;color:var(--brass);}
.mission-lock{font-size:1.5rem;color:var(--dim);}
.mission-badge{display:flex;gap:4px;margin-top:6px;}

/* ============ ACTIVITY SCREEN ============ */
.act-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.act-section-name{flex:1;font-family:var(--font-head);font-size:1rem;color:var(--brass);}
.act-score-badge{font-family:var(--font-mono);color:var(--brass);}
.act-steps{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-family:var(--font-head);cursor:pointer;transition:all .2s;color:var(--dim);touch-action:manipulation;}
.step-dot.done{background:var(--success);border-color:var(--success);color:white;}
.step-dot.active{border-color:var(--brass);color:var(--brass);background:rgba(201,162,39,.1);}
.step-dot.optional{border-style:dashed;}
.act-title{font-family:var(--font-head);font-size:1.4rem;margin-bottom:6px;}
.act-subtitle{color:var(--dim);font-size:.9rem;margin-bottom:20px;}
.act-content{margin-bottom:24px;}
.act-nav{display:flex;gap:12px;justify-content:space-between;margin-top:24px;}

/* ============ VOCAB MATCH ============ */
.vocab-words{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.vocab-word-card{padding:14px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;background:rgba(255,255,255,.03);touch-action:manipulation;min-height:44px;}
.vocab-word-card:hover{border-color:var(--brass);}
.vocab-word-card.selected{border-color:var(--brass);background:rgba(201,162,39,.15);}
.vocab-word-card.matched{border-color:var(--success);background:rgba(39,174,96,.1);color:var(--success);cursor:default;}
.vocab-word-card.wrong{border-color:var(--danger);background:rgba(192,57,43,.15);animation:shake .3s ease;}
.vocab-word{font-family:var(--font-head);font-size:.95rem;}
.vocab-hebrew{font-size:.78rem;color:var(--dim);margin-top:4px;direction:rtl;}
.vocab-emoji{font-size:1.5rem;margin-bottom:4px;}
.vocab-defs{display:grid;grid-template-columns:1fr;gap:8px;}
.vocab-def-card{padding:12px 16px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:.9rem;background:rgba(255,255,255,.03);touch-action:manipulation;min-height:44px;}
.vocab-def-card:hover{border-color:var(--brass);}
.vocab-def-card.selected{border-color:var(--brass);background:rgba(201,162,39,.15);}
.vocab-def-card.matched{border-color:var(--success);background:rgba(39,174,96,.1);color:var(--success);cursor:default;}
.vocab-def-card.wrong{border-color:var(--danger);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.vocab-score-display{text-align:center;font-family:var(--font-mono);font-size:1.1rem;color:var(--brass);margin-top:12px;}

/* ============ AUDIO READING ============ */
.text-display{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:22px;line-height:2;font-size:1rem;}
.text-word{display:inline;transition:background .15s,color .15s;}
.text-word.hl{background:var(--brass);color:var(--dark);border-radius:3px;padding:1px 3px;}
.text-word.hl-done{color:rgba(201,162,39,.6);}
.audio-controls{display:flex;align-items:center;gap:14px;margin-top:16px;padding:14px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid var(--border);}
.audio-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--brass);background:transparent;color:var(--brass);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;touch-action:manipulation;}
.audio-btn:active{background:rgba(201,162,39,.4) !important;}
.audio-btn:hover{background:rgba(201,162,39,.2);}
.audio-btn.playing{background:var(--brass);color:var(--dark);}
.audio-status{flex:1;font-size:.85rem;color:var(--dim);padding:0 8px;}
.audio-slider-wrap{display:none;}
.audio-slider-fill{height:100%;background:var(--brass);border-radius:99px;transition:width .2s;pointer-events:none;}
.audio-slider-thumb{position:absolute;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:var(--brass);transition:left .2s;pointer-events:none;}
.audio-time{font-family:var(--font-mono);font-size:.8rem;color:var(--dim);min-width:40px;text-align:right;}
.audio-speed{font-family:var(--font-mono);font-size:.8rem;color:var(--dim);cursor:pointer;border:1px solid var(--border);border-radius:4px;padding:2px 6px;background:transparent;color:var(--cream);}

/* ============ CLOZE ============ */
.cloze-mode-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cloze-mode-btn{padding:8px 16px;border-radius:6px;font-family:var(--font-head);font-size:.8rem;cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--dim);transition:all .2s;}
.cloze-mode-btn.active{border-color:var(--brass);color:var(--brass);background:rgba(201,162,39,.1);}
.cloze-text{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:22px;line-height:2.4;font-size:1rem;}
.cloze-blank{display:inline-block;position:relative;}
.cloze-input{border:none;border-bottom:2px solid var(--brass);background:rgba(201,162,39,.1);color:var(--cream);padding:2px 6px;font-size:.95rem;font-family:var(--font-body);min-width:60px;max-width:min(160px,42vw);outline:none;border-radius:4px 4px 0 0;text-align:center;}
.cloze-input.correct{border-bottom-color:var(--success);background:rgba(39,174,96,.15);color:var(--success);}
.cloze-input.wrong{border-bottom-color:var(--danger);background:rgba(192,57,43,.15);animation:shake .3s ease;}
.cloze-input.filled{border-bottom-color:var(--blue);}
.cloze-hint{font-size:.7rem;color:var(--dim);position:absolute;top:-16px;left:0;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border);}
.word-bank-word{padding:8px 14px;border:1px solid var(--border);border-radius:99px;cursor:pointer;font-size:.9rem;transition:all .2s;touch-action:manipulation;min-height:36px;display:inline-flex;align-items:center;}
.word-bank-word:hover{border-color:var(--brass);color:var(--brass);}
.word-bank-word.used{opacity:.3;text-decoration:line-through;cursor:not-allowed;}
.cloze-submit{margin-top:16px;}
.cloze-score-wrap{margin-top:12px;padding:12px;border-radius:8px;background:rgba(255,255,255,.04);text-align:center;}

/* ============ MINI GAMES ============ */
/* Memory Flip */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0;}
@media(max-width:480px){.memory-grid{grid-template-columns:repeat(3,1fr);gap:7px;}}
.mem-card{aspect-ratio:3/4;perspective:600px;cursor:pointer;touch-action:manipulation;}
.mem-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s;}
.mem-card.flipped .mem-card-inner{transform:rotateY(180deg);}
.mem-card.matched .mem-card-inner{transform:rotateY(180deg);}
.mem-card-front,.mem-card-back{position:absolute;inset:0;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;backface-visibility:hidden;font-size:.75rem;}
.mem-card-front{background:linear-gradient(135deg,var(--rust),#4a1a05);border:2px solid var(--copper);font-size:1.5rem;}
.mem-card-back{background:var(--card);border:2px solid var(--border);transform:rotateY(180deg);}
.mem-card.matched .mem-card-back{border-color:var(--success);background:rgba(39,174,96,.15);color:var(--success);}
.game-timer{font-family:var(--font-mono);font-size:2rem;text-align:center;color:var(--brass);margin:8px 0;}
.game-timer.urgent{color:var(--danger);animation:timerPulse .5s ease infinite alternate;}
@keyframes timerPulse{to{transform:scale(1.1);}}
.game-stats{display:flex;justify-content:space-around;margin:12px 0;}
.game-stat{text-align:center;}
.game-stat-val{font-family:var(--font-mono);font-size:1.5rem;color:var(--brass);}
.game-stat-lbl{font-size:.75rem;color:var(--dim);}

/* Word Catcher */
.catcher-arena{position:relative;height:240px;min-height:180px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin:16px 0;}
.catcher-def{padding:12px;text-align:center;font-size:.95rem;background:rgba(201,162,39,.1);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;}
.catcher-word{position:absolute;padding:8px 16px;border-radius:99px;border:2px solid var(--brass);background:rgba(201,162,39,.15);font-family:var(--font-head);cursor:pointer;transition:all .15s;user-select:none;font-size:.9rem;}
.catcher-word:hover{background:rgba(201,162,39,.3);}
.catcher-word.correct-catch{background:var(--success);border-color:var(--success);color:white;animation:popGood .3s ease;}
.catcher-word.wrong-catch{background:var(--danger);border-color:var(--danger);color:white;animation:popBad .3s ease;}
@keyframes popGood{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
@keyframes popBad{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.catcher-btns{display:flex;gap:12px;}

/* Speed Quiz */
.quiz-statement{font-size:1.1rem;text-align:center;padding:24px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid var(--border);min-height:100px;display:flex;align-items:center;justify-content:center;margin:16px 0;line-height:1.6;}
.quiz-btns{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;}
.quiz-tf-btn{padding:20px;font-size:1.2rem;font-family:var(--font-head);border-radius:10px;cursor:pointer;border:3px solid transparent;transition:all .2s;}
.quiz-tf-btn.true-btn{border-color:var(--success);color:var(--success);background:rgba(39,174,96,.08);}
.quiz-tf-btn.false-btn{border-color:var(--danger);color:var(--danger);background:rgba(192,57,43,.08);}
.quiz-tf-btn:hover.true-btn{background:rgba(39,174,96,.2);}
.quiz-tf-btn:hover.false-btn{background:rgba(192,57,43,.2);}
.quiz-tf-btn.correct-ans{background:var(--success) !important;border-color:var(--success) !important;color:white;}
.quiz-tf-btn.wrong-ans{background:var(--danger) !important;border-color:var(--danger) !important;color:white;}
.quiz-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px 0;}
.countdown-ring{width:50px;height:50px;position:relative;}
.countdown-svg{transform:rotate(-90deg);width:50px;height:50px;}
.countdown-circle{fill:none;stroke:var(--brass);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .1s linear;}
.countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:1.1rem;color:var(--brass);}
.quiz-q-counter{font-family:var(--font-mono);font-size:.85rem;color:var(--dim);}

/* ============ COMPREHENSION ============ */
.comp-question{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.comp-q-type{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.comp-q-type.factual{color:var(--blue);}
.comp-q-type.inference{color:var(--copper);}
.comp-q-type.higher-order{color:var(--danger);}
.comp-q-text{font-size:1rem;margin-bottom:12px;line-height:1.6;}
.comp-options{display:grid;gap:8px;}
.comp-option{padding:12px 16px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:.9rem;background:rgba(255,255,255,.03);text-align:left;min-height:44px;touch-action:manipulation;width:100%;}
.comp-option:hover{border-color:var(--brass);}
.comp-option.selected{border-color:var(--brass);background:rgba(201,162,39,.1);}
.comp-option.correct{border-color:var(--success);background:rgba(39,174,96,.15);color:var(--success);}
.comp-option.wrong{border-color:var(--danger);background:rgba(192,57,43,.15);color:var(--danger);}
.comp-explanation{margin-top:10px;padding:10px 14px;border-radius:6px;background:rgba(255,255,255,.06);font-size:.85rem;color:var(--dim);display:none;line-height:1.5;}
.comp-explanation.show{display:block;}

/* ============ TRANSLATION ============ */
.translation-text{padding:20px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid var(--border);margin-top:16px;font-size:.95rem;line-height:1.8;direction:rtl;text-align:right;display:none;}
.translation-text.show{display:block;}

/* ============ RECORDING ============ */
.recording-controls{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;}
.rec-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;font-size:2rem;transition:all .2s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.rec-btn-start{background:var(--danger);}
.rec-btn-stop{background:rgba(255,255,255,.1);border:2px solid var(--danger);animation:recPulse 1s ease infinite alternate;}
@keyframes recPulse{to{box-shadow:0 0 20px var(--danger);}}
.rec-status{font-family:var(--font-mono);color:var(--dim);}
.rec-playback{margin-top:16px;width:100%;}
audio{width:100%;border-radius:8px;margin-top:8px;}

/* ============ RESULTS ============ */
.results-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;padding:24px 16px 48px;}
.score-circle{width:160px;height:160px;border-radius:50%;border:6px solid var(--brass);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:24px auto;background:rgba(201,162,39,.08);box-shadow:0 0 40px rgba(201,162,39,.2);}
.score-num{font-family:var(--font-mono);font-size:3rem;color:var(--brass);}
.score-pct{font-family:var(--font-mono);font-size:1rem;color:var(--dim);}
.results-table{width:100%;text-align:left;border-collapse:collapse;margin:16px 0;}
.results-table th,.results-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.results-table th{font-family:var(--font-head);font-size:.85rem;color:var(--dim);}
.copy-box{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:var(--font-mono);font-size:.8rem;text-align:left;white-space:pre-wrap;word-break:break-word;margin:12px 0;max-height:200px;overflow-y:auto;}

/* ============ BONUS ============ */
.bonus-section{background:rgba(201,162,39,.05);border:1px dashed var(--brass);border-radius:10px;padding:20px;margin-top:20px;}
.bonus-title{font-family:var(--font-head);color:var(--brass);font-size:1.1rem;margin-bottom:12px;}
.bonus-inputs{display:grid;gap:12px;margin-top:12px;}
.bonus-label{font-size:.85rem;color:var(--dim);margin-bottom:4px;}

/* ============ FEEDBACK FLASH ============ */
.flash{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-family:var(--font-head);font-size:.95rem;z-index:999;animation:flashIn .3s ease,flashOut .3s ease 1.7s forwards;pointer-events:none;}
.flash-good{background:var(--success);color:white;}
.flash-bad{background:var(--danger);color:white;}
.flash-info{background:var(--blue);color:white;}
@keyframes flashIn{from{opacity:0;transform:translate(-50%,-20px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes flashOut{to{opacity:0;transform:translate(-50%,-20px);}}

/* ============ RESPONSIVE ============ */
@media (max-width: 600px) {
  .level-cards {
    grid-template-columns: 1fr !important;
  }

  .level-card {
    width: 100%;
    min-width: 0;
  }

  #app {
    max-width: 100%;
    overflow-x: hidden;
  }
}
@media(max-width:600px){
  #app{padding:12px;}
  .card{padding:16px;}
  .memory-grid{grid-template-columns:repeat(3,1fr);gap:6px;}
  .comp-option{font-size:.85rem;padding:10px 12px;}
  .act-steps{gap:4px;}
  .step-dot{width:24px;height:24px;font-size:.65rem;}
  .btn-lg{padding:14px 28px;}
  .score-circle{width:130px;height:130px;}
  .score-num{font-size:2.5rem;}
  .quiz-btns{gap:10px;}
  .quiz-tf-btn{padding:14px;font-size:1rem;}
  .act-nav{gap:8px;}
  .act-nav .btn{padding:10px 16px;font-size:.85rem;}
}
@media(max-width:400px){
  .cloze-text{padding:14px;font-size:.92rem;}
  .word-bank{padding:8px;gap:6px;}
  .word-bank-word{padding:5px 9px;font-size:.82rem;}
}

/* ============ UTILS ============ */
.flex{display:flex;}.flex-center{align-items:center;}.gap-8{gap:8px;}.gap-12{gap:12px;}
.text-center{text-align:center;}.text-sm{font-size:.85rem;}.text-dim{color:var(--dim);}
.text-brass{color:var(--brass);}.text-success{color:var(--success);}.text-danger{color:var(--danger);}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mt-24{margin-top:24px;}
.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}
.fw-bold{font-weight:bold;}
.hidden{display:none !important;}
.fade-in{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* v9 pedagogy/contrast overrides */
.comp-option,.word-bank-word,.vocab-word-card,.vocab-def-card,.cloze-input,textarea,input[type=text]{color:var(--cream);}

.text-dim{color:#c6bfb1;}
.audio-status{color:#ddd4c7;}
.badge-blue{background:#4c78a8;color:white;}
.badge-gold{background:var(--brass);color:#111;}

const $ = id => document.getElementById(id);
const shuffle = arr => [...arr].sort(() => Math.random() - .5);
function flash(msg, type='good'){
  const d = document.createElement('div');
  d.className = `flash flash-${type}`;
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 2100);
}
function getScore(sid, aid){ return state.actScore[`s${sid}a${aid}`] || 0; }
function setScore(sid, aid, pts){
  const key = `s${sid}a${aid}`;
  state.actScore[key] = Math.max(0, pts);
  // recalc total
  state.totalScore = Object.values(state.actScore).reduce((a,b)=>a+b,0);
}
function markComplete(sid, aid){
  if(!state.completedActivities[sid].includes(aid))
    state.completedActivities[sid].push(aid);
}
function isComplete(sid, aid){ return state.completedActivities[sid].includes(aid); }
function canUnlockNext(sid){
  return REQUIRED_ACTS.every(a => activityFullyDone(sid, a));
}
function sectionScore(sid){
  const keys = [1,3,4,5];
  return keys.reduce((s,a) => s + getScore(sid,a), 0);
}
function finalPercent(){
  // Score-based: total points earned / 120 max
  return Math.min(100, Math.round(state.totalScore / 120 * 100));
}
function sectionPct(sid){
  return Math.min(100, Math.round(sectionScore(sid) / 40 * 100));
}
function levelName(){ return ['','🟢 Support','🟡 Standard','🔴 Challenge'][state.level]; }
function lvl(){ return state.level; }
function showHebrew(){ return lvl() === 1; }
function sid(){ return state.currentSection; }
function sec(){ return DATA.sections[sid()-1]; }
function aid(){ return state.currentActivity; }

function bi(en, he){ return lvl()===1 ? `${en}<div dir="rtl" style="margin-top:6px;color:#d8cfbf;font-size:.88rem">${he}</div>` : en; }
function countWords(text){
  return text.trim().split(/\s+/).filter(function(w){ return w.length > 0; }).length;
}
// Returns true if text meets minimum effort: minWords words OR minChars characters
function isSubstantialText(text, minWords, minChars){
  var t = (text||'').trim();
  return t.length >= minChars || countWords(t) >= minWords;
}
function sectionCompletionPercent(sectionId){
  const required = REQUIRED_ACTS.length;
  let done = 0;
  REQUIRED_ACTS.forEach(a=>{ if(activityFullyDone(sectionId,a)) done++; });
  return Math.round((done/required)*100);
}
function overallCompletionPercent(){
  const total = DATA.sections.length * REQUIRED_ACTS.length;
  let done = 0;
  DATA.sections.forEach(s=> REQUIRED_ACTS.forEach(a=>{ if(activityFullyDone(s.id,a)) done++; }));
  return Math.round((done/total)*100);
}
function sectionKey(prefix, sectionId=null){ return `${prefix}_${sectionId||sid()}`; }
function getTranslationAttempt(sectionId=null){ return (state.translationAttempts[sectionKey('translation', sectionId)] || ''); }
function setTranslationAttempt(val, sectionId=null){ state.translationAttempts[sectionKey('translation', sectionId)] = val; saveProgress(); }
function getReflection(sectionId=null){ return (state.reflections[sectionKey('reflection', sectionId)] || ''); }
function setReflection(val, sectionId=null){ state.reflections[sectionKey('reflection', sectionId)] = val; saveProgress(); }
function setOpenEndedResponse(val, sectionId=null){ state.openEndedResponses[sectionKey('open', sectionId)] = val; saveProgress(); }

function markAudioStarted(kind, sectionId=null){
  const key = sectionKey(kind, sectionId) + '_' + (kind==='audioStarted' ? getSubStep('audio') : 'full');
  if(kind==='audioStarted') state.audioStarted[key]=true;
  else state.listenAgainStarted[key]=true;
  saveProgress();
}
function hasAudioStarted(kind, sectionId=null){
  const key = sectionKey(kind, sectionId) + '_' + (kind==='audioStarted' ? getSubStep('audio') : 'full');
  return kind==='audioStarted' ? !!state.audioStarted[key] : !!state.listenAgainStarted[key];
}

// ── Audio sufficiency tracking ────────────────────────
// Minimum seconds of playback before "listened" counts as meaningful
var AUDIO_MIN_PLAY_SECS = 7;
var _audioSufficientTimer = null;
var _audioSufficientCalled = false;
function _audSuffKey(isListenAgain){
  var step = isListenAgain ? 'full' : getSubStep('audio');
  return sid() + '_' + (isListenAgain ? 'laS' : 'audS') + '_' + step;
}
function markAudioSufficient(isListenAgain){
  var k = _audSuffKey(isListenAgain);
  if(isListenAgain){ state.listenAgainSufficient = state.listenAgainSufficient||{}; state.listenAgainSufficient[k]=true; }
  else { state.audioSufficient = state.audioSufficient||{}; state.audioSufficient[k]=true; }
  saveProgress();
}
function hasAudioSufficient(isListenAgain){
  var k = _audSuffKey(isListenAgain);
  if(isListenAgain) return !!(state.listenAgainSufficient && state.listenAgainSufficient[k]);
  return !!(state.audioSufficient && state.audioSufficient[k]);
}

// ── Sub-step helpers ──────────────────────────────
function getSubStep(type){ return (state.subSteps[sid()+'_'+type] || 0); }
function setSubStep(type, n){ state.subSteps[sid()+'_'+type] = n; saveProgress(); }
function resetSubStep(type){ state.subSteps[sid()+'_'+type] = 0; }
const SUBSTEP_ACTIVITY_MAP = {1:'vocab',2:'audio',3:'cloze',5:'comp'};
function activitySubKey(activityId){ return SUBSTEP_ACTIVITY_MAP[activityId] || null; }
function hasSubsectionsForActivity(activityId, sectionObj=null){
  const s = sectionObj || sec();
  if(activityId===1 && lvl()>1) return false;
  return !!(s && s.subSections && s.subSections.length && activitySubKey(activityId));
}
function activityFullyDone(sectionId, activityId){
  if(!(state.completedActivities[sectionId]||[]).includes(activityId)) return false;
  const s = DATA.sections[sectionId-1];
  if(hasSubsectionsForActivity(activityId, s)) {
    const key = sectionId + '_' + activitySubKey(activityId);
    return (state.subSteps[key] || 0) >= (s.subSections.length - 1);
  }
  return true;
}
function canOpenActivity(sectionId, activityId){
  if(!state.unlockedSections.includes(sectionId)) return false;
  for(let i=0;i<activityId;i++){
    if(REQUIRED_ACTS.includes(i) && !activityFullyDone(sectionId, i)) return false;
  }
  return true;
}
function currentSubsectionFor(activityId){
  const s = sec();
  if(!hasSubsectionsForActivity(activityId, s)) return null;
  const idx = Math.min(getSubStep(activitySubKey(activityId)), s.subSections.length-1);
  return {idx, sub:s.subSections[idx], total:s.subSections.length};
}
function progressSubActivity(activityId, points=0){
  const key = activitySubKey(activityId);
  const s = sec();
  if(!hasSubsectionsForActivity(activityId, s)){
    completeActivity(sid(), activityId, points);
    return;
  }
  const idx = getSubStep(key);
  const total = s.subSections.length;
  if(points > 0){
    const increment = Math.max(1, Math.round(points / total));
    setScore(sid(), activityId, Math.min(10, getScore(sid(), activityId) + increment));
  }
  if(idx < total - 1){
    setSubStep(key, idx + 1);
    const ac = $('actContent');
    if(ac){ ac.innerHTML = renderActivityContent(); setTimeout(initActivity, 30); }
    // Also update the subtitle so the sub-label badge stays current
    const subtitleEl = document.querySelector('.act-subtitle');
    if(subtitleEl){
      const a = aid(), s = sec();
      const info2 = currentSubsectionFor(a);
      subtitleEl.innerHTML = `${s.subtitle} &nbsp;|&nbsp; Level: ${levelName()}${info2?' &nbsp;|&nbsp; '+info2.sub.label:''}`;
    }
    flash('✓ Part complete. Moving to the next part.','good');
  } else {
    markComplete(sid(), activityId);
    const btn = $('nextBtn'); if(btn) btn.disabled = false;
    if(canUnlockNext(sid())){
      const nxt = sid() + 1;
      if(nxt <= DATA.sections.length && !state.unlockedSections.includes(nxt)) state.unlockedSections.push(nxt);
    }
    saveProgress();
    flash('✓ Activity complete!','good');
  }
}
function subsectionHeader(activityId){
  const info = currentSubsectionFor(activityId);
  if(!info) return '';
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)">
      <div style="display:flex;gap:5px;align-items:center">
        ${sec().subSections.map((ss,i)=>`<div title="${ss.label}" style="min-width:22px;height:6px;border-radius:99px;background:${i<info.idx?'var(--success)':i===info.idx?'var(--brass)':'rgba(255,255,255,.12)'};transition:background .35s;cursor:default"></div>`).join('')}
      </div>
      <span style="font-size:.78rem;font-family:var(--font-head);color:${info.idx===info.total-1?'var(--success)':'var(--brass)'}">
        ${info.sub.label} &nbsp;<span style="color:var(--dim);font-size:.7rem">${info.idx+1}&thinsp;/&thinsp;${info.total}</span>
      </span>
    </div>`;
}

const STORAGE_KEY = 'rube_goldberg_assignment_progress_v2';

function serializableState(){
  return {
    screen: state.screen,
    name: state.name,
    level: state.level,
    currentSection: state.currentSection,
    currentActivity: state.currentActivity,
    totalScore: state.totalScore,
    actScore: state.actScore,
    penalties: state.penalties,
    unlockedSections: state.unlockedSections,
    completedActivities: state.completedActivities,
    recordingSection: state.recordingSection,
    recordingPlayed: state.recordingPlayed,
    recordingBlobBase64: state.recordingBlobBase64 || '',
    clozeMode: state.clozeMode,
    bonusTask: state.bonusTask,
    teacherPhone: state.teacherPhone || '',
    subSteps: state.subSteps || {},
    translationAttempt: state.translationAttempt || '',
    translationAttempts: state.translationAttempts || {},
    reflections: state.reflections || {},
    audioStarted: state.audioStarted || {},
    listenAgainStarted: state.listenAgainStarted || {},
    openEndedResponses: state.openEndedResponses || {},
    audioSufficient: state.audioSufficient || {},
    listenAgainSufficient: state.listenAgainSufficient || {}
  };
}

function saveProgress(){
  try {
    state.resultsImageDataUrl = '';
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serializableState()));
    state.hasSavedProgress = true;
  } catch (e) {
    console.warn('Could not save progress', e);
  }
}

function base64ToBlob(base64, mime='audio/webm'){
  if(!base64) return null;
  const byteChars = atob(base64.split(',').pop());
  const byteNumbers = new Array(byteChars.length);
  for(let i=0;i<byteChars.length;i++) byteNumbers[i] = byteChars.charCodeAt(i);
  return new Blob([new Uint8Array(byteNumbers)], {type:mime});
}

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function hasSavedProgress(){
  try { return !!localStorage.getItem(STORAGE_KEY); } catch(e){ return false; }
}

function loadProgress(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const saved = JSON.parse(raw);
    Object.assign(state, saved);
    if(saved.recordingBlobBase64){
      state.recordingBlob = base64ToBlob(saved.recordingBlobBase64);
    }
    state.hasSavedProgress = true;
    return true;
  } catch (e) {
    console.warn('Could not load progress', e);
    return false;
  }
}

function clearProgress(){

let ttsActive = false;

// ─── Voice selection ──────────────────────────────────────
function getBestVoice(){
  const voices = speechSynthesis.getVoices();
  // Prefer clear English voices; fall back to any English
  const want = ['Google US English','Microsoft Aria','Samantha','Karen','Daniel','Alex'];
  for(const name of want){
    const v = voices.find(v => v.name.includes(name));
    if(v) return v;
  }
  return voices.find(v => v.lang && v.lang.startsWith('en')) || voices[0] || null;
}

// ─── Core TTS – simple play/stop, no word tracking ────────
function speakText(text, _unusedSpans, onEnd, onActualStart, onSufficient){
  speechSynthesis.cancel();
  ttsActive = true;
  // Clear any previous sufficiency timer
  if(_audioSufficientTimer){ clearTimeout(_audioSufficientTimer); _audioSufficientTimer=null; }
  _audioSufficientCalled = false;

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = typeof audioSpeed !== 'undefined' ? audioSpeed : 0.9;
  utt.pitch = 1.0;
  utt.volume = 1.0;

  // Try to pick a good voice; voices may be empty first call on mobile
  const voice = getBestVoice();
  if(voice) utt.voice = voice;

  utt.onstart = () => {
    const btn = $('audioPlayBtn');
    if(btn){ btn.classList.add('playing'); btn.textContent = '⏸'; }
    const st = $('audioStatus'); if(st) st.textContent = 'Playing…';
    // Mark as actually started only when TTS confirms playback began
    if(typeof onActualStart === 'function') onActualStart();
    // Start sufficiency timer – fires after AUDIO_MIN_PLAY_SECS of continuous playback
    _audioSufficientCalled = false;
    if(_audioSufficientTimer){ clearTimeout(_audioSufficientTimer); _audioSufficientTimer=null; }
    _audioSufficientTimer = setTimeout(function(){
      _audioSufficientCalled = true;
      _audioSufficientTimer = null;
      if(typeof onSufficient === 'function') onSufficient();
    }, AUDIO_MIN_PLAY_SECS * 1000);
  };

  utt.onend = () => {
    ttsActive = false;
    const btn = $('audioPlayBtn');
    if(btn){ btn.classList.remove('playing'); btn.textContent = '▶'; }
    const st = $('audioStatus'); if(st) st.textContent = 'Done – press ▶ to replay';
    // Natural end always counts as sufficient – clear timer and call callback if not yet called
    if(_audioSufficientTimer){ clearTimeout(_audioSufficientTimer); _audioSufficientTimer=null; }
    if(!_audioSufficientCalled && typeof onSufficient === 'function'){
      _audioSufficientCalled = true;
      onSufficient();
    }
    if(typeof onEnd === 'function') onEnd();
  };

  utt.onerror = (e) => {
    // Interrupted = user stopped early; clear timer so it doesn't fire after the fact
    if(e.error === 'interrupted'){
      if(_audioSufficientTimer){ clearTimeout(_audioSufficientTimer); _audioSufficientTimer=null; }
      return;
    }
    ttsActive = false;
    const btn = $('audioPlayBtn');
    if(btn){ btn.classList.remove('playing'); btn.textContent = '▶'; }
    const st = $('audioStatus'); if(st) st.textContent = 'Audio unavailable on this device';
  };

  state.audioUtterance = utt;
  // Small delay after cancel() prevents "interrupted" errors on Chrome Android
  setTimeout(() => {
    if(ttsActive) speechSynthesis.speak(utt);
  }, 60);
}

function stopSpeech(){
  ttsActive = false;
  // Clear the sufficiency timer so partial listening doesn't auto-qualify later
  if(typeof _audioSufficientTimer !== 'undefined' && _audioSufficientTimer){
    clearTimeout(_audioSufficientTimer); _audioSufficientTimer=null;
  }
  speechSynthesis.cancel();
  const btn = $('audioPlayBtn');
  if(btn){ btn.classList.remove('playing'); btn.textContent = '▶'; }
  const st = $('audioStatus'); if(st) st.textContent = 'Stopped';
}

async function startRecording(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    state.recordingStream = stream;
    const mr = new MediaRecorder(stream);
    state.mediaRecorder = mr;
    const chunks = [];
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = async () => {
      state.recordingBlob = new Blob(chunks, {type:'audio/webm'});
      state.recordingSection = sid();
      state.recordingPlayed = false;
      state.recordingBlobBase64 = await blobToBase64(state.recordingBlob);
      saveProgress();
      renderRecordingPlayback();
    };
    state.recordingStartTime = Date.now();
    mr.start();
    $('recStatus').textContent = '🔴 Recording...';
    $('recBtn').className = 'rec-btn rec-btn-stop';
    $('recBtn').textContent = '⏹';
    $('recBtn').onclick = stopRecording;
  } catch(e){
    flash('Microphone not available','bad');
  }
}

function stopRecording(){
  const elapsed = Date.now() - (state.recordingStartTime || Date.now());
  if(elapsed < 2500){
    if(state.mediaRecorder && state.mediaRecorder.state !== 'inactive'){
      state.mediaRecorder.ondataavailable = null;
      state.mediaRecorder.onstop = null;
      state.mediaRecorder.stop();
      if(state.recordingStream) state.recordingStream.getTracks().forEach(t => t.stop());
    }
    state.recordingBlob = null;
    state.recordingBlobBase64 = '';
    $('recStatus').textContent = '⚠️ Please record at least 3 seconds.';
    $('recBtn').className = 'rec-btn rec-btn-start';
    $('recBtn').textContent = '🎤';
    $('recBtn').onclick = startRecording;
    flash('Please record for at least 3 seconds','bad');
    return;
  }
  if(state.mediaRecorder && state.mediaRecorder.state !== 'inactive'){
    state.mediaRecorder.stop();
    if(state.recordingStream) state.recordingStream.getTracks().forEach(t => t.stop());
  }
  $('recStatus').textContent = '✅ Recording saved!';
  $('recBtn').className = 'rec-btn rec-btn-start';
  $('recBtn').textContent = '🎤';
  $('recBtn').onclick = startRecording;
}

function resetRecordingForSection(){ state.recordingBlob=null; state.recordingBlobBase64=''; state.recordingSection=null; state.recordingPlayed=false; saveProgress(); const ac=$('actContent'); if(ac){ ac.innerHTML=renderRecording(); } }

function renderRecordingPlayback(){
  const wrap = $('recPlayback');
  if(!wrap || !state.recordingBlob) return;
  const url = URL.createObjectURL(state.recordingBlob);
  // Build complete HTML at once – never use innerHTML+= as it re-parses the DOM
  // and destroys event listeners attached to existing elements
  const secId = sid();
  wrap.innerHTML = `<p style="color:var(--success);margin-bottom:8px">✅ Great job! Listen to your recording to complete this step:</p>
    <audio controls id="studentRecording" src="${url}"></audio>
    <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
      <a class="btn btn-ghost" href="${url}" download="${(state.name||'student').replace(/[^a-z0-9]/gi,'_')}_recording.webm">⬇ Download Recording</a>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
      <button class="btn btn-ghost" onclick="resetRecordingForSection()">↺ Re-record</button>
      <button id="recordDoneBtn" class="btn btn-success" disabled
        onclick="completeActivity(${secId},8,0);$('nextBtn').disabled=false;flash('Recording complete! ✓','good')">
        ✓ I listened back – complete this step
      </button>
    </div>`;
  // Attach ended listener to the freshly rendered audio element
  const audio = $('studentRecording');
  if(audio){
    audio.addEventListener('ended', ()=>{
      state.recordingPlayed = true;
      saveProgress();
      const doneBtn = $('recordDoneBtn');
      if(doneBtn) doneBtn.disabled = false;
    }, {once:true});
  }
  // If already played (restored from saved progress), enable the button immediately
  if(state.recordingPlayed){
    const doneBtn = $('recordDoneBtn');
    if(doneBtn) doneBtn.disabled = false;
  }
}

function go(screen, opts={}){
  stopSpeech();
  // Stop all running games / timers
  if(state.catcherState){ state.catcherState.active=false; if(state.catcherState.wordTimers) state.catcherState.wordTimers.forEach(function(t){clearTimeout(t);}); }
  if(typeof sqTimer!=='undefined' && sqTimer){ clearInterval(sqTimer); sqTimer=null; }
  if(state.memoryState && state.memoryState.timer){ clearInterval(state.memoryState.timer); state.memoryState.timer=null; }

  Object.assign(state, opts);
  state.screen = screen;
  saveProgress();
  render();
}

function goActivity(sectionId, actId){
  if(!canOpenActivity(sectionId, actId)){ flash('Complete the earlier steps first.','bad'); return; }
  state.currentSection = sectionId;
  state.currentActivity = actId;
  go('activity');
}

function nextActivity(){
  stopSpeech();
  if(!activityFullyDone(sid(), aid())){ flash('Complete this step first.','bad'); return; }
  const nextAid = aid() + 1;
  if(nextAid <= 8 && nextAid < ACT_NAMES.length){
    goActivity(sid(), nextAid);
  } else {
    go('hub');
  }
}

function prevActivity(){
  stopSpeech();
  // Stop any in-progress games
  if(state.catcherState){ state.catcherState.active=false; if(state.catcherState.wordTimers) state.catcherState.wordTimers.forEach(t=>clearTimeout(t)); }
  if(state.quizState && typeof sqTimer !== 'undefined' && sqTimer){ clearInterval(sqTimer); sqTimer = null; }
  if(state.memoryState && state.memoryState.timer){ clearInterval(state.memoryState.timer); }
  if(aid() > 0) goActivity(sid(), aid()-1);
  else go('hub');
}

function renderActivityContent(){
  switch(aid()){
    case 0: return renderIntro();
    case 1: return renderVocab();
    case 2: return renderAudio();
    case 3: return renderCloze();
    case 4: return renderMiniGame();
    case 5: return renderComprehension();
    case 6: return renderListenAgain();
    case 7: return renderTranslation();
    case 8: return renderRecording();
    default: return '<p>Activity coming soon.</p>';
  }
}

function initActivity(){
  switch(aid()){
    case 1: initVocab(); break;
    case 2: initAudio(); break;
    case 3: initCloze(); break;
    case 4: initMiniGame(); break;
    case 5: initComprehension(); break;
    case 6: initListenAgain(); break;
    case 7: break;
    case 8: if(state.recordingBlob && state.recordingSection===sid()) setTimeout(renderRecordingPlayback,50); break;
  }
  // If already complete, enable next button
  if(activityFullyDone(sid(), aid())){
    const btn = $('nextBtn');
    if(btn) btn.disabled = false;
  }
}

function completeActivity(sid, aid, pts){
  setScore(sid, aid, pts);
  markComplete(sid, aid);
  const btn = $('nextBtn');
  if(btn) btn.disabled = false;
  // Unlock next section if needed
  if(canUnlockNext(sid)){
    const nxt = sid + 1;
    if(nxt <= DATA.sections.length && !state.unlockedSections.includes(nxt))
      state.unlockedSections.push(nxt);
  }
  saveProgress();
}


function firstOpenActivityForSection(sectionId){
  for(let i=0;i<ACT_NAMES.length;i++){
    if(!activityFullyDone(sectionId, i)) return i;
  }
  return 8;
}

function allRequiredSectionsComplete(){
  return DATA.sections.every(s => canUnlockNext(s.id));
}

let vocabSelected = {word:null, def:null};
let vocabMatched = [];
let vocabScore = 0;
let vocabPenalty = 0;
let vocabAnswered = {};

function simplifyDefinition(s){
  if(!s) return '';
  s = s.replace(/^to\s+/i,'');
  s = s.replace(/something|someone/gi,'a thing');
  s = s.replace(/;.*$/,'');
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function getVocabPool(){
  const sectionVocab = sec().vocab || [];
  const info = lvl()===1 ? currentSubsectionFor(1) : null;
  if(info && info.sub.focusVocab && info.sub.focusVocab.length){
    const chosen = [];
    const used = new Set();
    info.sub.focusVocab.forEach(i => {
      if(sectionVocab[i] && !used.has(i)) { chosen.push(sectionVocab[i]); used.add(i); }
    });
    for(let i=0;i<sectionVocab.length && chosen.length < 4;i++){
      if(!used.has(i)) { chosen.push(sectionVocab[i]); used.add(i); }
    }
    return chosen;
  }
  return sectionVocab;
}
function getVocabTargetDisplay(w){
  if(lvl() === 1) return w.hebrew || w.def;
  if(lvl() === 2) return simplifyDefinition(w.def);
  return w.def;
}
function getVocabTargetLabel(){
  return lvl()===1 ? 'Hebrew meaning' : (lvl()===2 ? 'Simple meaning' : 'Definition');
}
function jsString(s){
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
}
function getVocabChoiceOptions(words, wordIndex){
  const correct = getVocabTargetDisplay(words[wordIndex]);
  const distractorPool = words
    .map((w,i)=>({i, text:getVocabTargetDisplay(w)}))
    .filter(x => x.i !== wordIndex && x.text !== correct);
  const needed = lvl()===3 ? 3 : 2;
  const distractors = shuffle(distractorPool).slice(0, needed).map(x=>x.text);
  const fallbackPool = (sec().vocab||[])
    .map(w=>getVocabTargetDisplay(w))
    .filter(t => t !== correct && !distractors.includes(t));
  while(distractors.length < needed && fallbackPool.length){
    distractors.push(fallbackPool.shift());
  }
  return shuffle([correct, ...distractors]);
}
function renderVocab(){
  const words = getVocabPool();
  window._vocabCurrent = words;
  const vocabInstr = lvl()===1
    ? bi('🟢 Choose the correct Hebrew meaning for each word. Every word has real choices.','בחרו את הפירוש הנכון בעברית לכל מילה. לכל מילה יש כמה אפשרויות אמיתיות.')
    : lvl()===2
    ? '🟡 Choose the correct simple English meaning for each word.'
    : '🔴 Choose the best full definition for each word.';
  const items = words.map((w,i)=>{
    const options = getVocabChoiceOptions(words, i);
    return `<div class="card card-sm" id="vocabCard${i}" style="margin:10px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <div>
          <div class="vocab-word" style="font-size:1.05rem">${w.emoji? w.emoji+' ' : ''}${w.word}</div>
          <div class="text-dim text-sm">${getVocabTargetLabel()}</div>
        </div>
        <div id="vocabStatus${i}" class="badge ${vocabAnswered[i] ? 'badge-green' : 'badge-blue'}">${vocabAnswered[i] ? bi('Done','סיימתי') : bi('Choose one','בחר תשובה')}</div>
      </div>
      <div style="display:grid;gap:8px">
        ${options.map((opt,oi)=>`<button class="comp-option" id="vqo${i}_${oi}" onclick="vocabChooseOption(${i}, ${oi}, '${jsString(opt)}')">${String.fromCharCode(65+oi)}. ${opt}</button>`).join('')}
      </div>
      ${lvl()===3 ? `<div id="vocabExample${i}" class="mt-12 text-dim text-sm" style="display:none">📝 ${w.example || ''}</div>` : ''}
    </div>`;
  }).join('');
  return `<div>${subsectionHeader(1)}<p style="margin-bottom:12px;color:var(--dim);font-size:.9rem">${vocabInstr}</p>${items}<div class="vocab-score-display mt-12">Completed: <span id="vocabCount">${Object.keys(vocabAnswered).length}</span> / ${words.length} &nbsp;|&nbsp; Score: <span id="vocabScore">${vocabScore}</span> pts</div></div>`;
}
function initVocab(){
  vocabSelected = {word:null, def:null};
  vocabMatched = [];
  vocabScore = 0;
  vocabPenalty = 0;
  vocabAnswered = {};
  window._vocabCurrent = getVocabPool();
}
function vocabChooseOption(wordIndex, optIndex, optText){
  const words = window._vocabCurrent || getVocabPool();
  if(vocabAnswered[wordIndex]) return;
  const correctText = getVocabTargetDisplay(words[wordIndex]);
  const buttons = Array.from(document.querySelectorAll(`[id^="vqo${wordIndex}_"]`));
  const clicked = document.getElementById(`vqo${wordIndex}_${optIndex}`);
  if(optText === correctText){
    if(clicked) clicked.classList.add('correct');
    buttons.forEach(btn => btn.disabled = true);
    vocabAnswered[wordIndex] = true;
    vocabScore += (lvl()===3 ? 3 : 2);
    const status = $('vocabStatus'+wordIndex);
    if(status){ status.textContent = 'Correct'; status.className = 'badge badge-green'; }
    const ex = $('vocabExample'+wordIndex);
    if(ex) ex.style.display = 'block';
    const vc=$('vocabCount'), vs=$('vocabScore');
    if(vc) vc.textContent = Object.keys(vocabAnswered).length;
    if(vs) vs.textContent = vocabScore;
    if(Object.keys(vocabAnswered).length === words.length){
      progressSubActivity(1, Math.min(10, vocabScore));
    }
  } else {
    if(clicked) clicked.classList.add('wrong');
    const status = $('vocabStatus'+wordIndex);
    if(status){ status.textContent = 'Try again'; status.className = 'badge badge-red'; }
    vocabPenalty += (lvl()===1 ? 0 : 1);
    vocabScore = Math.max(0, vocabScore - (lvl()===1 ? 0 : 1));
    const vs=$('vocabScore'); if(vs) vs.textContent = vocabScore;
    setTimeout(()=>{ if(clicked) clicked.classList.remove('wrong'); }, 450);
    flash(bi('Try again','נסה שוב'),'bad');
  }
}

function buildClozeHTMLSub(sub, mode){
  // For level 1, strip extra blanks beyond clozeWordsL1 count
  let text = sub.clozeText;
  if(mode === 'easy' && sub.clozeWordsL1 && sub.clozeWordsL1.length < sub.clozeWords.length){
    // Replace extra blanks with plain text (show answer inline for harder ones)
    const l1Set = new Set(sub.clozeWordsL1.map(w=>w.toLowerCase()));
    text = text.replace(/\[([^\]]+)\]/g, (m, ans) => {
      if(l1Set.has(ans.toLowerCase())) return m; // keep as blank
      return `<u style="color:var(--brass);font-weight:bold">${ans}</u>`; // show answer
    });
  }
  clozeBlanks = [];
  let html = '';
  const parts = text.split(/\[([^\]]+)\]/g);
  let blankIdx = 0;
  for(let i=0; i<parts.length; i++){
    if(i%2===0){
      html += parts[i].replace(/\n/g,'<br>');
    } else {
      const answer = parts[i];
      const hint = mode==='easy' ? answer[0].toUpperCase()+'___ ' : '';
      const width = Math.max(80, answer.length * 11);
      html += `<span class="cloze-blank">
        ${mode==='easy'?`<span class="cloze-hint">${hint}</span>`:''}
        <input type="text" class="cloze-input" id="cb${blankIdx}" data-answer="${answer}" 
          placeholder="${mode==='easy'?answer[0]+'...':'...'}" style="width:${width}px"
          onclick="focusBlank(this)" oninput="this.classList.remove('correct','wrong')" 
          onkeydown="if(event.key==='Enter')jumpNextBlank(${blankIdx})">
      </span>`;
      clozeBlanks.push(answer);
      blankIdx++;
    }
  }
  return html;
}

function buildClozeHTML(){
  const s = sec();
  const text = s.clozeText;
  const mode = state.clozeMode;
  clozeBlanks = [];
  let html = '';
  const parts = text.split(/\[([^\]]+)\]/g);
  let blankIdx = 0;
  for(let i=0; i<parts.length; i++){
    if(i%2===0){
      html += parts[i].replace(/\n/g,'<br>');
    } else {
      const answer = parts[i];
      const hint = mode==='easy' ? answer[0].toUpperCase()+'___ ' : '';
      const width = Math.max(80, answer.length * 11);
      html += `<span class="cloze-blank">
        ${mode==='easy'?`<span class="cloze-hint">${hint}</span>`:''}
        <input type="text" class="cloze-input" id="cb${blankIdx}" data-answer="${answer}" 
          placeholder="${mode==='easy'?answer[0]+'...':'...'}" style="width:${width}px"
          onclick="focusBlank(this)" oninput="this.classList.remove('correct','wrong')" 
          onkeydown="if(event.key==='Enter')jumpNextBlank(${blankIdx})">
      </span>`;
      clozeBlanks.push(answer);
      blankIdx++;
    }
  }
  return html;
}

function buildWordBankSub(words){
  let pool = [...words];
  const sub = currentSubsectionFor(3)?.sub;
  const extras = ((sub && sub.clozeWords) ? sub.clozeWords : []).filter(w=>!pool.includes(w));
  extras.forEach(w=>{ if(pool.length < Math.max(3, words.length+1)) pool.push(w); });
  const sectionExtras = (sec().clozeWords||[]).filter(w=>!pool.includes(w));
  sectionExtras.forEach(w=>{ if(pool.length < Math.max(4, words.length+2)) pool.push(w); });
  return shuffle(pool).map(w => `<span class="word-bank-word" id="wb_${w.replace(/ /g,'_')}" onclick="fillFromBank('${w.replace(/'/g,"\'")}')">${w}</span>`).join('');
}

function buildWordBank(){
  const words = shuffle([...sec().clozeWords]);
  return words.map(w => `<span class="word-bank-word" id="wb_${w.replace(/ /g,'_')}" onclick="fillFromBank('${w.replace(/'/g,"\\'")}')">${w}</span>`).join('');
}

function focusBlank(el){
  el.style.outline = '2px solid var(--brass)';
  window._lastFocusedBlank = el;
}

function fillFromBank(word){
  // Fill the currently focused or next empty blank
  const el = window._lastFocusedBlank;
  if(el && !el.value){
    el.value = word;
    el.classList.add('filled');
    const wb = $(`wb_${word.replace(/ /g,'_')}`);
    if(wb) wb.classList.add('used');
    return;
  }
  // Find next empty
  for(let i=0;i<clozeBlanks.length;i++){
    const inp = $('cb'+i);
    if(inp && !inp.value){
      inp.value = word;
      inp.classList.add('filled');
      const wb = $(`wb_${word.replace(/ /g,'_')}`);
      if(wb) wb.classList.add('used');
      window._lastFocusedBlank = inp;
      return;
    }
  }
}

function jumpNextBlank(current){
  const next = $('cb'+(current+1));
  if(next){ next.focus(); window._lastFocusedBlank = next; }
}

function setClozeMode(mode){ return; }

function initCloze(){
  clozeSubmitted = false;
  window._lastFocusedBlank = null;
}

function resetCloze(){
  clozeSubmitted = false;
  for(let i=0;i<clozeBlanks.length;i++){
    const inp = $('cb'+i);
    if(inp){ inp.value=''; inp.className='cloze-input'; }
  }
  document.querySelectorAll('.word-bank-word').forEach(w=>w.classList.remove('used'));
  const res = $('clozeResult'); if(res) res.innerHTML='';
  window._lastFocusedBlank = null;
}

function checkCloze(){
  if(clozeSubmitted) return;
  // 0-blank sub-section: still require audio to have been done
  if(clozeBlanks.length === 0){
    if(!hasAudioSufficient(false)){ flash(bi('Listen to the text first.','האזינו לטקסט קודם.'),'bad'); return; }
    progressSubActivity(3, 10);
    return;
  }
  // Require at least one blank to be filled before checking
  const anyFilled = clozeBlanks.some((_,i)=>{ const inp=$('cb'+i); return inp && inp.value.trim().length>0; });
  if(!anyFilled){ flash(bi('Fill in at least one blank first.','מלאו לפחות שדה אחד קודם.'),'bad'); return; }
  let correct = 0, wrong = 0;
  clozeBlanks.forEach((answer, i) => {
    const inp = $('cb'+i);
    if(!inp) return;
    const val = inp.value.trim().toLowerCase();
    if(val === answer.toLowerCase()){
      inp.classList.add('correct');
      correct++;
    } else {
      inp.classList.add('wrong');
      inp.value = '';
      wrong++;
    }
  });
  const pts = Math.max(0, Math.round((correct / clozeBlanks.length) * 10) - wrong);
  const res = $('clozeResult');
  if(wrong===0){
    clozeSubmitted = true;
    if(res) res.innerHTML = `<div class="cloze-score-wrap">
      <p style="font-size:1.1rem">✓ Correct: <strong style="color:var(--success)">${correct}</strong> / ${clozeBlanks.length} &nbsp;|&nbsp; Points: <strong style="color:var(--brass)">${pts}</strong></p>
      <p style="color:var(--success);font-weight:bold">🎉 Perfect! Moving to the next part…</p>
    </div>`;
    // Delay progression so feedback is visible first
    setTimeout(() => progressSubActivity(3, pts), 600);
  } else {
    // Set flag immediately so rapid re-clicks can't append duplicate buttons
    clozeSubmitted = true;
    // Show result with inline Accept + Reset – no setTimeout race risk
    if(res) res.innerHTML = `<div class="cloze-score-wrap">
    <p style="font-size:1.1rem">✓ Correct: <strong style="color:var(--success)">${correct}</strong> / ${clozeBlanks.length} &nbsp;|&nbsp; Points: <strong style="color:var(--brass)">${pts}</strong></p>
    <p style="color:var(--dim);font-size:.85rem;margin-top:4px">🔁 Fix the highlighted blanks and try again.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button class="btn btn-outline" style="touch-action:manipulation" onclick="resetCloze()">↺ Try Again</button>

    </div>
    </div>`;
  }
}

// ---- MEMORY FLIP ----
function renderMemoryGame(){
  return `<div>
    <p style="color:var(--dim);font-size:.9rem;margin-bottom:12px">
      🃏 <strong>Memory Match!</strong> Find the matching word + definition pairs. Faster = more points!
    </p>
    <div class="game-stats">
      <div class="game-stat"><div class="game-stat-val" id="memTime">60</div><div class="game-stat-lbl">Seconds</div></div>
      <div class="game-stat"><div class="game-stat-val" id="memMatches">0</div><div class="game-stat-lbl">Matched</div></div>
      <div class="game-stat"><div class="game-stat-val" id="memErrors">0</div><div class="game-stat-lbl">Errors</div></div>
    </div>
    <div class="memory-grid" id="memGrid"></div>
    <div id="memResult"></div>
  </div>`;
}

function initMemoryGame(){
  const pairs = sec().memoryPairs;
  state.memoryState = {
    cards: shuffle([...pairs.map((p,i)=>({id:i,type:'word',text:p.word,pairId:i})),
                    ...pairs.map((p,i)=>({id:i+pairs.length,type:'def',text:p.def,pairId:i}))]),
    flipped: [],
    matched: [],
    errors: 0,
    startTime: Date.now(),
    timeLeft: 60,
    locked: false,
    timer: null,
  };
  renderMemGrid();
  state.memoryState.timer = setInterval(memTick, 1000);
}

function renderMemGrid(){
  const grid = $('memGrid'); if(!grid) return;
  const ms = state.memoryState;
  grid.innerHTML = ms.cards.map((c,i) => `
    <div class="mem-card ${ms.matched.includes(c.pairId+'_'+c.type)?'matched':ms.flipped.includes(i)?'flipped':''}" 
         onclick="flipMemCard(${i})" id="mc${i}">
      <div class="mem-card-inner">
        <div class="mem-card-front">⚙</div>
        <div class="mem-card-back">${c.text}</div>
      </div>
    </div>`).join('');
}

function flipMemCard(i){
  const ms = state.memoryState;
  if(!ms || ms.locked) return;
  if(ms.flipped.includes(i)) return;
  const card = ms.cards[i];
  if(ms.matched.includes(card.pairId+'_word') && ms.matched.includes(card.pairId+'_def')) return;
  ms.flipped.push(i);
  const el = $('mc'+i); if(el) el.classList.add('flipped');

  if(ms.flipped.length === 2){
    ms.locked = true;
    const c1 = ms.cards[ms.flipped[0]];
    const c2 = ms.cards[ms.flipped[1]];
    if(c1.pairId === c2.pairId && c1.type !== c2.type){
      // Match!
      ms.matched.push(c1.pairId+'_word', c1.pairId+'_def');
      ms.flipped.forEach(fi => { const el=$('mc'+fi); if(el) el.classList.add('matched'); });
      ms.flipped = [];
      ms.locked = false;
      const m = $('memMatches'); if(m) m.textContent = Math.floor(ms.matched.length/2);
      if(ms.matched.length === ms.cards.length){ endMemGame(true); }
    } else {
      // No match
      ms.errors++;
      const e = $('memErrors'); if(e) e.textContent = ms.errors;
      setTimeout(()=>{
        ms.flipped.forEach(fi => { const el=$('mc'+fi); if(el) el.classList.remove('flipped'); });
        ms.flipped = []; ms.locked = false;
      }, 900);
    }
  }
}

function memTick(){
  const ms = state.memoryState; if(!ms) return;
  ms.timeLeft--;
  const t = $('memTime');
  if(t){ t.textContent = ms.timeLeft; if(ms.timeLeft <= 10) t.classList.add('urgent'); }
  if(ms.timeLeft <= 0){ endMemGame(false); }
}

function endMemGame(won){
  const ms = state.memoryState; if(!ms) return;
  clearInterval(ms.timer);
  const pairs = Math.floor(ms.matched.length/2);
  const total = sec().memoryPairs.length;
  const pts = Math.max(0, Math.round((pairs/total)*10) - Math.floor(ms.errors/2));
  const res = $('memResult');
  if(res) res.innerHTML = `<div style="text-align:center;padding:16px;background:rgba(255,255,255,.05);border-radius:8px;margin-top:12px">
    <p style="font-size:1.3rem;color:var(--brass);margin-bottom:8px">${won?'🎉 Well done!':'⏰ Time\'s up!'}</p>
    <p>Matched: <strong>${pairs}/${total}</strong> &nbsp;|&nbsp; Errors: <strong>${ms.errors}</strong> &nbsp;|&nbsp; Score: <strong style="color:var(--brass)">${pts} pts</strong></p>
    <button class="btn btn-gold mt-12" onclick="completeActivity(${sid()},4,${pts});$('nextBtn').disabled=false;flash('Game complete!','good')">✓ Claim Score</button>
    <button class="btn btn-ghost" style="margin-left:8px;margin-top:12px" onclick="$('actContent').innerHTML=renderMiniGame();setTimeout(initMiniGame,50)">↺ Try Again</button>
  </div>`;
}

// ---- WORD CATCHER ----
function renderCatcherGame(){
  return `<div>
    <p style="color:var(--dim);font-size:.9rem;margin-bottom:8px">
      🎯 <strong>Word Catcher!</strong> Read the definition and click the CORRECT word when it appears!
    </p>
    <div class="game-stats">
      <div class="game-stat"><div class="game-stat-val" id="catchScore">0</div><div class="game-stat-lbl">Score</div></div>
      <div class="game-stat"><div class="game-stat-val" id="catchRound">1</div><div class="game-stat-lbl">Round</div></div>
      <div class="game-stat"><div class="game-stat-val" id="catchTotal">${sec().catcherRounds.length}</div><div class="game-stat-lbl">Total</div></div>
    </div>
    <div class="catcher-def" id="catcherDef">Loading...</div>
    <div class="catcher-arena" id="catcherArena"></div>
    <div id="catchResult"></div>
  </div>`;
}

function initCatcherGame(){
  state.catcherState = {
    round: 0,
    score: 0,
    errors: 0,
    timer: null,
    words: [],
    active: true,
  };
  runCatcherRound();
}

function runCatcherRound(){
  const cs = state.catcherState; if(!cs || !cs.active) return;
  const rounds = sec().catcherRounds;
  if(cs.round >= rounds.length){ endCatcherGame(); return; }
  const r = rounds[cs.round];
  const def = $('catcherDef'); if(def) def.textContent = '🔍 ' + r.def;
  const arena = $('catcherArena'); if(!arena) return;
  arena.innerHTML = '';
  // Spawn words with delays
  const allWords = shuffle([r.correct, ...r.distractors]);
  cs.wordTimers = [];
  allWords.forEach((word, i) => {
    const t = setTimeout(() => {
      if(!cs.active) return;
      const wEl = document.createElement('div');
      wEl.className = 'catcher-word';
      wEl.textContent = word;
      wEl.style.left = (5 + Math.random()*75) + '%';
      wEl.style.top = (10 + Math.random()*70) + '%';
      arena.appendChild(wEl);
      const handleCatch = (ev) => {
        ev.preventDefault();
        if(wEl._catchHandled) return;
        wEl._catchHandled = true;
        if(word === r.correct){
          wEl.classList.add('correct-catch');
          cs.score += 2; cs.round++;
          const sc = $('catchScore'); if(sc) sc.textContent = cs.score;
          const rn = $('catchRound'); if(rn) rn.textContent = cs.round+1;
          setTimeout(() => runCatcherRound(), 700);
        } else {
          wEl.classList.add('wrong-catch');
          wEl._catchHandled = false; // allow retrying after wrong
          cs.errors++;
          cs.score = Math.max(0, cs.score - 1);
          const sc = $('catchScore'); if(sc) sc.textContent = cs.score;
          setTimeout(() => wEl.classList.remove('wrong-catch'), 500);
        }
      };
      wEl.addEventListener('touchstart', handleCatch, {passive:false});
      wEl.addEventListener('click', handleCatch);
    }, i * 600);
    cs.wordTimers.push(t);
  });
}

function endCatcherGame(){
  const cs = state.catcherState; if(!cs) return;
  cs.active = false;
  const pts = Math.min(10, cs.score);
  const res = $('catchResult');
  if(res) res.innerHTML = `<div style="text-align:center;padding:16px;background:rgba(255,255,255,.05);border-radius:8px;margin-top:12px">
    <p style="font-size:1.3rem;color:var(--brass)">🎯 Game Over!</p>
    <p>Score: <strong>${cs.score}</strong> | Errors: <strong>${cs.errors}</strong> | Points: <strong style="color:var(--brass)">${pts}</strong></p>
    <button class="btn btn-gold mt-12" onclick="completeActivity(${sid()},4,${pts});$('nextBtn').disabled=false;flash('Game complete!','good')">✓ Claim Score</button>
    <button class="btn btn-ghost" style="margin-left:8px;margin-top:12px" onclick="state.catcherState=null;$('actContent').innerHTML=renderCatcherGame();setTimeout(initCatcherGame,30)">↺ Play Again</button>
  </div>`;
}

let sqTimer = null;
let sqTimeLeft = 4;

function renderSpeedQuiz(){
  return `<div>
    <p style="color:var(--dim);font-size:.9rem;margin-bottom:8px">
      ⚡ <strong>Speed Quiz!</strong> True or False? Answer before the timer runs out!
    </p>
    <div class="quiz-countdown">
      <div class="countdown-ring">
        <svg class="countdown-svg" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="21" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/>
          <circle class="countdown-circle" id="sqRing" cx="25" cy="25" r="21" stroke-dasharray="132" stroke-dashoffset="0"/>
        </svg>
        <div class="countdown-num" id="sqNum">4</div>
      </div>
      <div class="quiz-q-counter" id="sqCounter">Question 1 / ${sec().speedQuizItems.length}</div>
    </div>
    <div class="quiz-statement" id="sqStatement">Get ready...</div>
    <div class="quiz-btns">
      <button class="btn quiz-tf-btn true-btn" onclick="answerQuiz(true)">✓ TRUE</button>
      <button class="btn quiz-tf-btn false-btn" onclick="answerQuiz(false)">✗ FALSE</button>
    </div>
    <div id="sqResult"></div>
  </div>`;
}

function initSpeedQuiz(){
  state.quizState = {
    items: shuffle(sec().speedQuizItems),
    current: 0,
    score: 0,
    errors: 0,
    answered: false,
  };
  setTimeout(loadSQQuestion, 400);
}

function loadSQQuestion(){
  const qs = state.quizState; if(!qs) return;
  if(qs.current >= qs.items.length){ endSpeedQuiz(); return; }
  const item = qs.items[qs.current];
  const stmt = $('sqStatement'); if(stmt) stmt.textContent = item.stmt;
  const ctr = $('sqCounter'); if(ctr) ctr.textContent = `Question ${qs.current+1} / ${qs.items.length}`;
  qs.answered = false;
  // Reset buttons
  document.querySelectorAll('.quiz-tf-btn').forEach(b => { b.classList.remove('correct-ans','wrong-ans'); b.disabled = false; });
  // Start timer
  sqTimeLeft = 4;
  if(sqTimer) clearInterval(sqTimer);
  sqTimer = setInterval(sqTick, 100);
  updateSQTimer();
}

function sqTick(){
  const qs = state.quizState; if(!qs) return;
  if(qs.answered){ clearInterval(sqTimer); return; }
  sqTimeLeft -= 0.1;
  if(sqTimeLeft <= 0){ sqTimeLeft = 0; answerQuiz(null); }
  updateSQTimer();
}

function updateSQTimer(){
  const pct = sqTimeLeft / 4;
  const ring = $('sqRing');
  if(ring) ring.style.strokeDashoffset = 132 * (1 - pct);
  const num = $('sqNum');
  if(num) num.textContent = Math.ceil(sqTimeLeft);
  if(sqTimeLeft <= 1 && ring) ring.style.stroke = 'var(--danger)';
  else if(ring) ring.style.stroke = 'var(--brass)';
}

function answerQuiz(answer){
  const qs = state.quizState; if(!qs || qs.answered) return;
  qs.answered = true;
  clearInterval(sqTimer);
  // Disable both buttons immediately to prevent double-tap
  document.querySelectorAll('.quiz-tf-btn').forEach(b => b.disabled = true);
  const item = qs.items[qs.current];
  const correct = answer !== null && answer === item.ans;
  if(correct){
    qs.score += 2;
    flash('✓ Correct! +2','good');
    const btn = answer ? document.querySelector('.true-btn') : document.querySelector('.false-btn');
    if(btn) btn.classList.add('correct-ans');
  } else {
    qs.errors++;
    qs.score = Math.max(0, qs.score - 1);
    if(answer === null){
      // Timed out – show correct answer only, don't highlight a wrong button
      flash("⏰ Time's up! " + item.explain, 'bad');
    } else {
      flash('✗ Wrong! ' + item.explain, 'bad');
      const wrongBtn = answer ? document.querySelector('.true-btn') : document.querySelector('.false-btn');
      if(wrongBtn) wrongBtn.classList.add('wrong-ans');
    }
    const correctBtn = item.ans ? document.querySelector('.true-btn') : document.querySelector('.false-btn');
    if(correctBtn) correctBtn.classList.add('correct-ans');
  }
  qs.current++;
  setTimeout(loadSQQuestion, 1500);
}

function endSpeedQuiz(){
  const qs = state.quizState; if(!qs) return;
  clearInterval(sqTimer);
  const pts = Math.min(10, qs.score);
  const stmt = $('sqStatement');
  if(stmt) stmt.textContent = '⚡ Quiz Complete!';
  const res = $('sqResult');
  if(res) res.innerHTML = `<div style="text-align:center;padding:16px;background:rgba(255,255,255,.05);border-radius:8px;margin-top:12px">
    <p style="font-size:1.3rem;color:var(--brass)">🏆 Results!</p>
    <p>Correct: <strong style="color:var(--success)">${qs.score>0?Math.floor(qs.score/2):0}</strong> | Wrong: <strong style="color:var(--danger)">${qs.errors}</strong> | Points: <strong style="color:var(--brass)">${pts}</strong></p>
    <button class="btn btn-gold mt-12" onclick="completeActivity(${sid()},4,${pts});$('nextBtn').disabled=false;flash('Quiz complete!','good')">✓ Claim Score</button>
    <button class="btn btn-ghost" style="margin-left:8px;margin-top:12px" onclick="state.quizState=null;sqTimer=null;sqTimeLeft=4;$('actContent').innerHTML=renderSpeedQuiz();setTimeout(initSpeedQuiz,30)">↺ Try Again</button>
  </div>`;
}

}
function initComprehension(){ compAnswers = {}; compChecked = false; }
function selectCompOpt(qi, oi){ if(compChecked) return; const qs = getCompQuestions(); qs[qi].opts.forEach((_,j)=>{ const el=$('co'+qi+'_'+j); if(el) el.classList.remove('selected'); }); const el = $('co'+qi+'_'+oi); if(el) el.classList.add('selected'); compAnswers[qi] = oi; }
function resetComp(){ compChecked = false; compAnswers = {}; const qs=getCompQuestions(); qs.forEach((q,qi)=>{ q.opts.forEach((_,oi)=>{ const el=$('co'+qi+'_'+oi); if(el){ el.disabled=false; el.classList.remove('selected','correct','wrong'); } }); const exp=$('ce'+qi); if(exp) exp.classList.remove('show'); }); const res=$('compResult'); if(res) res.innerHTML=''; }
function checkComp(){
  if(compChecked) return;
  const qs = getCompQuestions();
  if(Object.keys(compAnswers).length < qs.length){ flash('Please answer the question first!','bad'); return; }
  const openEnded = $('openEndedAnswer');
  if(openEnded && !isSubstantialText(openEnded.value.trim(), 10, 40)){ flash(bi('Write a fuller challenge response (at least 10 words).','כתבו תגובה ארוכה יותר לאתגר – לפחות 10 מילים.'),'bad'); return; }
  if(openEnded) setOpenEndedResponse(openEnded.value);
  compChecked = true;
  let correct = 0;
  qs.forEach((q,qi)=>{ const chosen=compAnswers[qi]; q.opts.forEach((_,oi)=>{ const el=$('co'+qi+'_'+oi); if(!el) return; el.disabled=true; if(oi===q.ans) el.classList.add('correct'); else if(oi===chosen) el.classList.add('wrong'); }); const exp=$('ce'+qi); if(exp) exp.classList.add('show'); if(chosen===q.ans) correct++; });
  const allCorrect = correct===qs.length;
  let pts = Math.max(0, Math.round((correct/qs.length)*10));
  if(openEnded) pts = Math.min(10, pts + 2);
  const res=$('compResult');
  if(allCorrect){
    if(res) res.innerHTML = `<div style="margin-top:16px;padding:16px;background:rgba(255,255,255,.05);border-radius:8px;text-align:center"><p style="font-size:1.1rem">Correct: <strong style="color:var(--success)">${correct}/${qs.length}</strong> &nbsp;|&nbsp; Points: <strong style="color:var(--brass)">${pts}</strong></p><p style="color:var(--success);margin-top:4px">🎉 Well done!</p></div>`;
    const submitBtn = $('compSubmitBtn'); if(submitBtn) submitBtn.disabled = true;
    setTimeout(() => progressSubActivity(5, pts), 700);
  } else {
    if(res) res.innerHTML = `<div style="margin-top:16px;padding:16px;background:rgba(255,255,255,.05);border-radius:8px;text-align:center"><p style="font-size:1rem">You got <strong style="color:var(--brass)">${correct}/${qs.length}</strong> correct.</p><p style="color:var(--dim);margin:8px 0">${bi('Read the explanation and try again.','קראו את ההסבר ונסו שוב.')}</p><button class="btn btn-outline" onclick="resetComp()">${bi('↺ Try Again','↺ נסה שוב')}</button></div>`;
  }
}
